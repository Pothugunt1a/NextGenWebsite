
<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main sphere circles -->
  <circle cx="400" cy="400" r="350" stroke="currentColor" stroke-width="1" stroke-dasharray="4 4" opacity="0.2"/>
  <circle cx="400" cy="400" r="300" stroke="currentColor" stroke-width="1" stroke-dasharray="4 4" opacity="0.15"/>
  <circle cx="400" cy="400" r="250" stroke="currentColor" stroke-width="1" stroke-dasharray="4 4" opacity="0.1"/>
  
  <!-- Latitude lines -->
  <path d="M 50 400 H 750" stroke="currentColor" stroke-width="1" stroke-dasharray="4 4" opacity="0.1"/>
  <path d="M 100 300 H 700" stroke="currentColor" stroke-width="1" stroke-dasharray="4 4" opacity="0.1"/>
  <path d="M 100 500 H 700" stroke="currentColor" stroke-width="1" stroke-dasharray="4 4" opacity="0.1"/>
  
  <!-- Longitude lines -->
  <path d="M 400 50 V 750" stroke="currentColor" stroke-width="1" stroke-dasharray="4 4" opacity="0.1"/>
  <path d="M 300 100 V 700" stroke="currentColor" stroke-width="1" stroke-dasharray="4 4" opacity="0.1"/>
  <path d="M 500 100 V 700" stroke="currentColor" stroke-width="1" stroke-dasharray="4 4" opacity="0.1"/>
  
  <!-- Dotted pattern -->
  <g opacity="0.2">
    <circle cx="400" cy="400" r="2" fill="currentColor"/>
    <circle cx="420" cy="400" r="2" fill="currentColor"/>
    <circle cx="380" cy="400" r="2" fill="currentColor"/>
    <circle cx="400" cy="420" r="2" fill="currentColor"/>
    <circle cx="400" cy="380" r="2" fill="currentColor"/>
  </g>
</svg>
